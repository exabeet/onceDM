<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OnceDM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="icon.png" alt="OnceDM" class="logo-mark">
      <div class="logo-copy">
        <div class="logo-row">
          <span class="logo-title">OnceDM</span>
          <span id="app-version" class="version-badge"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="header-refresh-btn" class="btn-icon" title="Refresh Page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"></path>
          <path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>

      <button id="theme-btn" class="btn-icon" title="Toggle Theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
      </button>

      <button id="zip-btn" class="btn-icon accent-btn" title="Download All as ZIP">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero-card">
      <div class="hero-copy">
        <span class="hero-chip">Unlimited</span>
        <h1>Save only view-once DM media without limits.</h1>
        <p>OnceDM scans your conversation for disappearing media sent once. Download them or export them!</p>
      </div>
      <div class="hero-glow" aria-hidden="true"></div>
    </section>

    <div class="status-bar">
      <span id="count-badge" class="badge-count">0 items</span>
    </div>

    <div id="media-grid" class="grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="scanning-footer">
        <div class="scanning-text">
          <div class="loading-spinner"></div>
          <span>Looking for media...</span>
        </div>
        <button id="refresh-page-btn" class="btn-refresh-small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"></path>
            <path d="M1 20v-6h6"></path>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Refresh Page
        </button>
      </div>
    </div>
  </main>

  <div id="status-indicator" class="status-indicator scanning" title="Scanning active">
    <span class="status-dot"></span>
  </div>

  <div id="toast">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    <span id="toast-msg">Action Successful</span>
  </div>

  <div id="overlay"></div>

  <script src="popup.js"></script>
</body>
</html>
